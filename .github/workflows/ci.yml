name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Linters run over the whole working tree (prettier/eslint/stylelint are not nx
      # targets), so no git history is needed — keep the default shallow checkout.
      - name: Checkout code repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/setup

      - name: Linters
        run: |
          pnpm run prettier
          pnpm run stylelint --max-warnings=0
          pnpm run eslint --max-warnings=0

  unit:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — nx-set-shas needs full history to derive the affected base SHA.
      - name: Checkout code repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Derive affected SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      # Scope to the primitives library — CI never tested the apps/docs projects, and
      # `affected` has no project allow-list (only --exclude), so list them explicitly.
      - name: Run unit tests
        run: npx nx affected -t test --exclude=radix-storybook,radix-ssr-testing,radix-docs,radix-ng

  builds:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — nx-set-shas needs full history to derive the affected base SHA.
      - name: Checkout code repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Derive affected SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      # Scope to the primitives library — CI never built the apps/docs projects (radix-docs
      # is deprecated and its build is broken), and `affected` has no project allow-list.
      - name: Build Primitives and Schematics
        run: npx nx affected -t build build:schematics --exclude=radix-storybook,radix-ssr-testing,radix-docs,radix-ng

  skills:
    runs-on: ubuntu-latest
    steps:
      # Regenerates the bundle and diffs it against the working tree — no git history needed.
      - name: Checkout code repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/setup

      - name: Verify skills bundle is up to date
        run: |
          pnpm skills:build
          if [ -n "$(git status --porcelain skills)" ]; then
            echo "::error::Skills bundle is out of date. Run 'pnpm skills:build' and commit the result."
            git -c core.pager=cat diff -- skills
            exit 1
          fi

  summary:
    if: ${{ always() }}
    needs: [lint, unit, builds, skills]
    runs-on: ubuntu-latest
    steps:
      - name: On error
        if: ${{ needs.builds.result != 'success' || needs.unit.result != 'success' || needs.lint.result != 'success' || needs.skills.result != 'success' }}
        run: exit 1
