name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  install-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

  lint:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Linters
        run: |
          pnpm run prettier
          pnpm run stylelint --max-warnings=0
          pnpm run eslint --max-warnings=0

  unit:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Run unit tests
        run: pnpm primitives:test

  builds:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build Primitives
        run: pnpm primitives:build

      - name: Build Schematics
        run: pnpm primitives:build:schematics

  skills:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Verify skills bundle is up to date
        run: |
          pnpm skills:build
          if [ -n "$(git status --porcelain skills)" ]; then
            echo "::error::Skills bundle is out of date. Run 'pnpm skills:build' and commit the result."
            git -c core.pager=cat diff -- skills
            exit 1
          fi

  summary:
    if: ${{ always() }}
    needs: [lint, unit, builds, skills]
    runs-on: ubuntu-latest
    steps:
      - name: On error
        if: ${{ needs.builds.result != 'success' || needs.unit.result != 'success' || needs.lint.result != 'success' || needs.skills.result != 'success' }}
        run: exit 1
